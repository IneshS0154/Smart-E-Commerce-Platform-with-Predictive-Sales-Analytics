spring.application.name=SECMS

spring.datasource.url=jdbc:mysql://localhost:3306/anywear_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=admin1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.properties.hibernate.jdbc.time_zone=UTC

server.port=8080

jwt.secret=anywearSecMS2026SuperSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong!
jwt.expiration-ms=86400000

logging.level.org.springframework.security=DEBUG

# Multipart file upload config
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB

# Image upload storage – saves images into the React frontend public folder
# Vite serves public/ at root, so /assets/images/products/... works automatically
app.upload.dir=../Frontend/SECMS/public/assets/images/products
app.base-url=http://localhost:8080
